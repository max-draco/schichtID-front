name: Deploy SchichtID Build

on:
  push:
    branches:
      - main  # triggers workflow when you push to main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Deploy contents of build folder to VPS
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            mkdir -p /var/www/loginSchicht
            rsync -avz --delete ./build/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/loginSchicht/
